version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: pharmacy-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: pharmacy
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: pharmacy-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/pharmacy
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: pharmacy-frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://backend:5000
    depends_on:
      - backend

volumes:
  mongo-data